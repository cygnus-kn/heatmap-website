<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Note</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Modern Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Load heatmap data to find next/prev & titles -->
    <script src="data.js"></script>
    <!-- Marked.js for parsing Markdown securely and quickly -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-body: #0f111a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-card: rgba(255, 255, 255, 0.05);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-glow: rgba(232, 121, 249, 0.15); /* Light Pink-Purple */
            --accent-text: #e879f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
            line-height: 1.7;
            background-image: 
                radial-gradient(ellipse at top center, var(--accent-glow) 0%, transparent 60%);
            background-attachment: fixed;
            background-size: 100% 100vh;
        }

        .note-container {
            max-width: 750px;
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 24px;
            padding: 3rem 4rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-card);
            position: relative;
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            width: 100%;
        }

        .back-link, .nav-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover, .nav-link:hover {
            color: var(--text-main);
        }

        .back-link svg, .nav-link svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .back-link svg {
            margin-right: 6px;
        }

        .nav-link.prev svg {
            margin-right: 6px;
        }

        .nav-link.next svg {
            margin-left: 6px;
        }

        .nav-buttons {
            display: flex;
            gap: 1.5rem;
        }

        .nav-link.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .date-badge {
            display: inline-block;
            background: rgba(232, 121, 249, 0.1);
            color: var(--accent-text);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
            border: 1px solid rgba(232, 121, 249, 0.2);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
            line-height: 1.3;
        }

        .content {
            font-size: 1.1rem;
            color: #cbd5e1;
        }
        
        /* Auto Markdown styling */
        .content p { margin-bottom: 1.5rem; }
        .content p:last-child { margin-bottom: 0; }
        
        .content h1, .content h2, .content h3, .content h4 {
            color: #ffffff;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        
        .content ul, .content ol {
            margin-bottom: 1.5rem;
            padding-left: 2rem;
        }
        
        .content a {
            color: var(--accent-text);
            text-decoration: none;
        }
        .content a:hover { text-decoration: underline; }
        
        .content blockquote {
            border-left: 4px solid var(--accent-text);
            padding-left: 1rem;
            color: var(--text-muted);
            font-style: italic;
            background: rgba(255,255,255,0.02);
        }
        
        /* Wikilink styles */
        .content a.wikilink {
            color: var(--accent-text);
            text-decoration: none;
            background: rgba(232, 121, 249, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .content a.wikilink:hover {
            background: rgba(232, 121, 249, 0.2);
            text-decoration: none;
        }
        .content .wikilink-unresolved {
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            padding: 2px 6px;
            border-radius: 4px;
            opacity: 0.8;
            cursor: not-allowed;
        }

        hr {
            border: 0;
            height: 1px;
            background: var(--border-card);
            margin: 3rem 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .note-container { padding: 2rem; }
            h1 { font-size: 1.8rem; }
            .content { font-size: 1rem; }
            body { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>

    <div class="note-container">
        <header>
            <div class="nav-wrapper">
                <a href="index.html" class="back-link">
                    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Back to Heatmap
                </a>
                <div class="nav-buttons">
                    <a href="#" class="nav-link prev disabled" id="btn-prev">
                        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                        Prev Date
                    </a>
                    <a href="#" class="nav-link next disabled" id="btn-next">
                        Next Date
                        <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                    </a>
                </div>
            </div>
            <div>
                <span class="date-badge" id="note-date">Loading...</span>
                <h1 id="note-title">Loading note content...</h1>
            </div>
        </header>

        <div class="content" id="note-content">
            <p>Fetching your note...</p>
        </div>
    </div>

    <script>
        // 1. Get the file parameter from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const fileParam = urlParams.get('file');

        const titleEl = document.getElementById('note-title');
        const contentEl = document.getElementById('note-content');
        const dateEl = document.getElementById('note-date');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        if (!fileParam) {
            titleEl.textContent = "No File Selected";
            contentEl.innerHTML = "<p>Please click a square on the Heatmap to view a note.</p>";
        } else {
            // 2. Identify Metadata from data.js
            const validDates = Object.keys(heatmapData).filter(d => heatmapData[d].count > 0).sort();
            
            let currentIndex = -1;
            let currentDataDateStr = null;
            let noteMetaData = null;

            for (let i = 0; i < validDates.length; i++) {
                if (heatmapData[validDates[i]].path === fileParam) {
                    currentIndex = i;
                    currentDataDateStr = validDates[i];
                    noteMetaData = heatmapData[validDates[i]];
                    break;
                }
            }

            if (currentDataDateStr && noteMetaData) {
                // Formatting Date manually
                const dateObj = new Date(currentDataDateStr);
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                // Adjust for timezones strictly so it matches the string
                const formattedDate = dateObj.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC' }) || currentDataDateStr;
                
                dateEl.textContent = formattedDate;
                titleEl.textContent = noteMetaData.title || currentDataDateStr;
                document.title = `Note: ${noteMetaData.title}`;

                // Setup Prev/Next Navigation
                if (currentIndex > 0) {
                    const prevDate = validDates[currentIndex - 1];
                    btnPrev.classList.remove('disabled');
                    btnPrev.href = `?file=${encodeURIComponent(heatmapData[prevDate].path)}`;
                    btnPrev.title = prevDate;
                }
                if (currentIndex < validDates.length - 1) {
                    const nextDate = validDates[currentIndex + 1];
                    btnNext.classList.remove('disabled');
                    btnNext.href = `?file=${encodeURIComponent(heatmapData[nextDate].path)}`;
                    btnNext.title = nextDate;
                }
            } else {
                titleEl.textContent = "Note Not Found";
                dateEl.textContent = "Unknown Date";
            }

            // 3. Fetch the content from the local notes directory
            const fetchPath = fileParam;

            fetch(fetchPath)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Local HTTP Fetch failed. Status: " + response.status);
                    }
                    return response.text();
                })
                .then(text => {
                    // Remove Obsidian YAML Frontmatter visually from rendering if present
                    const frontmatterRegex = /^---\r?\n([\s\S]*?)\r?\n---\r?\n/;
                    let cleanMarkdown = text.replace(frontmatterRegex, '');
                    
                    // Parse Obsidian Wikilinks [[Link]] or [[Link|Alias]]
                    cleanMarkdown = cleanMarkdown.replace(/\[\[(.*?)\]\]/g, (match, p1) => {
                        let linkText = p1;
                        let linkTarget = p1;
                        
                        // Handle aliases like [[target|alias]]
                        if (p1.includes('|')) {
                            const parts = p1.split('|');
                            linkTarget = parts[0];
                            linkText = parts[1];
                        }
                        
                        // Find this note in our data to construct a proper local URL
                        let linkedPath = null;
                        
                        // Check if the link matches any note title or date in our dataset
                        for (const date in heatmapData) {
                            // Removing .md from paths if user linked without it, or checking titles
                            const dataTitle = heatmapData[date].title;
                            const fullFilename = heatmapData[date].path.split('/').pop();
                            const filenameWithoutExt = fullFilename.replace('.md', '');
                            
                            // Check matches
                            if (linkTarget === dataTitle || linkTarget === filenameWithoutExt || linkTarget === date || linkTarget + '.md' === fullFilename) {
                                linkedPath = heatmapData[date].path;
                                break;
                            }
                        }
                        
                        // If we found the note in our index, make it an internal link, otherwise make it unclickable or native
                        if (linkedPath) {
                            return `<a href="?file=${encodeURIComponent(linkedPath)}" class="wikilink">${linkText}</a>`;
                        } else {
                            // Fallback for unindexed notes
                            return `<span class="wikilink-unresolved">${linkText}</span>`;
                        }
                    });
                    
                    // Convert raw Markdown text to standard HTML using Marked.js
                    contentEl.innerHTML = marked.parse(cleanMarkdown);
                })
                .catch(error => {
                    console.error("Fetch error:", error);
                    contentEl.innerHTML = `
                        <p style="color: #ef4444;"><strong>Failed to load the file directly!</strong></p>
                        <p>Browsers block local <code>file:///</code> Javascript fetch requests for security reasons.</p>
                        <p><strong>To make this work locally:</strong> Start a local dev server (e.g. <code>python3 -m http.server</code>) or upload this repository to GitHub Pages as intended!</p>
                    `;
                });
        }
    </script>

</body>
</html>
